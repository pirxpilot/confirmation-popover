<!DOCTYPE 5>
<html lang="en">
  <head>
    <title>ConfirmationPopover</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <link rel="stylesheet" href="../build/build.css" />
    <style>
      body {
        padding: 60px;
        font: 300 14px sans-serif;
        min-height: 1000px;
      }
      a {
        display: inline-block;
        border: 1px solid #eee;
        padding: 10px;
        color: black;
        text-decoration: none;
        margin: 55px;
        width: 100px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <title>ConfirmationPopover</title>
    <script src="../build/build.js"></script>
    <a href="#" id="auto">Auto</a>
    <a href="#" id="auto-title">Auto Title</a>
    <script>
      const Popover = self.confirmation_popover.default;
      Popover.effect = 'fade';

      let confirm = new Popover('Are you sure?');
      confirm.show('#auto', (ok) => {
        console.log(ok ? 'ok' : 'cancel');
      });

      confirm = new Popover('This action cannot be undone.', 'Delete tobi?');
      confirm.focus('ok');
      confirm.ok('do it');
      confirm.show('#auto-title', (ok) => {
        console.log(ok ? 'ok' : 'cancel');
      });
    </script>
  </body>
</html>
